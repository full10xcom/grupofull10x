<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Em construção</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root {
  --accent:#c1d5ed;
  --accent-dark:#3a7bbf;
  --accent-light:#d4e7f5;
  --accent-soft:#f0f7fd;
  --ink:#111111;
  --text-main:#111111;
  --text-secondary:#555555;
  --text-soft:#888888;
  --paper:#ffffff;
  --surface:#f0f7fd;
  --surface-2:#e8f3fb;
  --shadow-accent:rgba(58,123,191,.38);
  --dark-1:#0d1b2a;
  --dark-2:#1a3a5c;
  --divider:linear-gradient(90deg, transparent, rgba(193,213,237,.5), transparent);
  --icon-gradient:linear-gradient(135deg,#3a7bbf,#2d6aa0);
  --title-gradient:linear-gradient(90deg,#0d1b2a 0%,#3a7bbf 35%,#c1d5ed 55%,#3a7bbf 75%,#0d1b2a 100%);
  --button-gradient:linear-gradient(45deg,#c1d5ed,#3a7bbf,#c1d5ed,#3a7bbf);
  --indigo:#3a7bbf;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;background:#fff;color:#111;overflow-x:hidden;}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--surface);}
::-webkit-scrollbar-thumb{background:rgba(193,213,237,.48);border-radius:99px;}

/* NAV LINK — gradient text + underline on hover */
.nav-link{
  position:relative;
  display:inline-block;
  color:#374151;
  text-decoration:none;
  font-weight:600;
  font-size:.875rem;
  transition:color .3s ease;
  background-image:linear-gradient(90deg,#0d1b2a,#3a7bbf,#c1d5ed);
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:#374151;
  background-size:200%;
}
.nav-link::after{
  content:'';
  position:absolute;
  left:0;bottom:-3px;
  width:0;height:2px;
  border-radius:999px;
  background:linear-gradient(90deg,#0d1b2a,#3a7bbf,#c1d5ed);
  transition:width .35s cubic-bezier(.4,0,.2,1);
}
.nav-link:hover{
  -webkit-text-fill-color:transparent;
  background-position:100%;
  transition:background-position .4s ease, -webkit-text-fill-color .1s;
}
.nav-link:hover::after{width:100%;}

/* MOBILE NAV LINK */
.nav-link-mobile{
  position:relative;
  display:block;
  border-radius:10px;
  padding:.65rem .75rem;
  text-decoration:none;
  font-weight:700;
  font-size:1.05rem;
  color:#0d1b2a;
  background-image:linear-gradient(90deg,#0d1b2a,#3a7bbf,#c1d5ed);
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:#0d1b2a;
  background-size:200%;
  transition:background-position .4s ease, background-color .2s;
}
.nav-link-mobile::after{
  content:'';
  position:absolute;
  left:.75rem;bottom:6px;
  width:0;height:2px;
  border-radius:999px;
  background:linear-gradient(90deg,#0d1b2a,#3a7bbf,#c1d5ed);
  transition:width .35s cubic-bezier(.4,0,.2,1);
}
.nav-link-mobile:hover{
  -webkit-text-fill-color:transparent;
  background-position:100%;
  background-color:rgba(193,213,237,.08);
}
.nav-link-mobile:hover::after{width:calc(100% - 1.5rem);}

/* LIGHT BEAM */
.light-beam{
  pointer-events:none;position:fixed;top:-10vh;left:50%;transform:translateX(-50%);
  width:560px;height:88vh;
  background:conic-gradient(from 180deg at 50% 0%,rgba(193,213,237,.18) 0deg,transparent 55deg,transparent 305deg,rgba(58,123,191,.14) 360deg);
  filter:blur(34px);z-index:0;animation:beamPulse 9s ease-in-out infinite alternate;
}
@keyframes beamPulse{from{opacity:.55;transform:translateX(-50%) scaleX(1);}to{opacity:1;transform:translateX(-50%) scaleX(1.2);}}

/* GRAIN */
body::before{
  content:'';position:fixed;inset:0;z-index:1000;pointer-events:none;opacity:.022;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* GRADIENT TEXT */
.gradient-text-hero{
  background-image:var(--title-gradient);
  background-size:240% 100%;
  background-position:0% 50%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:titleFlow 7.5s linear infinite;
  will-change:background-position;
}
@keyframes titleFlow{
  from{background-position:0% 50%;}
  to{background-position:200% 50%;}
}

/* BTN GLOW */
.btn-glow {
  position:relative;
  display:inline-flex;align-items:center;justify-content:center;
  overflow:hidden;
  border-radius:999px;
  color:#ffffff;
  border:1px solid rgba(58,123,191,.34);
  background-color:var(--accent);
  background-image:var(--button-gradient);
  background-size:400% 200%;
  animation:3.4s cubic-bezier(0.2,0.5,0.9,0.6) 2s infinite textura;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow .25s ease;
  box-shadow:0 14px 34px rgba(58,123,191,.22),0 0 0 1px rgba(255,255,255,.22) inset;
}
.btn-glow::before{
  content:"";position:absolute;inset:1px;border-radius:inherit;
  background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,0));
  pointer-events:none;
}
.btn-glow::after{
  content:"";position:absolute;top:50%;transform:translateY(-50%);
  left:var(--btn-left,-20%);z-index:1;
  width:22%;height:76%;
  background:linear-gradient(90deg,rgba(255,255,255,.12),rgba(212,231,245,.92),rgba(255,255,255,.08));
  filter:blur(14px);opacity:.58;mix-blend-mode:screen;pointer-events:none;
}
.btn-glow:hover{
  transform:translateY(-2px) scale(1.02);
  box-shadow:0 18px 40px rgba(58,123,191,.28),0 0 0 1px rgba(255,255,255,.22) inset;
}
.btn-glow > *{position:relative;z-index:2;}
@keyframes textura{
  0%{background-position:0 0;}
  100%{background-position:100% 0;}
}

/* BTN OUTLINE */
.btn-outline{
  display:inline-flex;align-items:center;justify-content:center;
  background:#ffffff;border:1px solid rgba(58,123,191,.24);
  color:var(--dark-1);border-radius:999px;
  box-shadow:0 8px 24px rgba(13,27,42,.06);
  transition:background .2s,border-color .2s,color .2s,transform .2s;
}
.btn-outline:hover{
  background:var(--surface);border-color:rgba(58,123,191,.42);color:var(--dark-2);
  transform:translateY(-2px);
}

/* HERO BADGE */
.hero-badge{
  display:inline-flex;align-items:center;gap:8px;
  border:1px solid rgba(58,123,191,.18);background:rgba(193,213,237,.14);
  backdrop-filter:blur(10px);border-radius:999px;
  padding:.38rem 1rem;font-size:.8rem;font-weight:500;color:var(--dark-1);
}

/* HEADER GLASS */
#main-header{
  position:fixed;
  transition:background .45s cubic-bezier(.4,0,.2,1),border-color .45s,box-shadow .45s;
}
#main-header.nav-top{background:transparent;border-bottom-color:transparent;box-shadow:none;}
#main-header.nav-scrolled{
  background:rgba(255,255,255,.84);backdrop-filter:blur(28px) saturate(210%) brightness(1.05);
  -webkit-backdrop-filter:blur(28px) saturate(210%) brightness(1.05);
  border-bottom-color:rgba(193,213,237,.12);
  box-shadow:0 4px 28px rgba(193,213,237,.08),0 1px 3px rgba(0,0,0,.05),inset 0 1px 0 rgba(255,255,255,.88);
}

/* BLOB BG */
@keyframes blob-turn{
  0%{transform:translate(-50%,-50%) rotate(0deg);}
  100%{transform:translate(-50%,-50%) rotate(360deg);}
}
.blob-bg{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:900px;height:900px;border-radius:50%;
  filter:blur(112px);z-index:0;pointer-events:none;
  animation:blob-turn 18s linear infinite;
  transform-origin:center;opacity:.28;
  background:conic-gradient(rgba(193,213,237,.16),rgba(212,231,245,.24),rgba(193,213,237,.18),rgba(232,243,251,.14));
}
.orb-bg{
  position:fixed;top:50%;left:60%;
  transform:translate(-50%,-50%);
  width:1154px;height:1154px;
  filter:blur(140px);z-index:0;pointer-events:none;
  animation:blob-turn 18s linear infinite;
  transform-origin:center;
  border-radius:40% 60% 55% 45%/50% 45% 55% 50%;
  background:conic-gradient(from 0deg,rgba(193,213,237,.18) 0%,rgba(212,231,245,.12) 25%,rgba(193,213,237,.06) 50%,rgba(58,123,191,.14) 75%,rgba(193,213,237,.18) 100%);
  opacity:.16;
}

.has-blob{position:relative;overflow:hidden;isolation:isolate;z-index:0;}
.has-blob > :not([aria-hidden="true"]):not(.absolute){position:relative;z-index:1;}

/* LIGHT GLOW EFFECT */
#hero::before{
  content:"";
  position:absolute;
  top:50%;
  left:50%;
  width:800px;
  height:800px;
  transform:translate(-50%,-50%);
  background:#3a7bbf;
  border-radius:100%;
  filter:blur(180px);
  pointer-events:none !important;
  z-index:0;
  opacity:0.18;
}
#hero::after{
  content:"";
  position:absolute;
  top:0;
  left:inherit;
  right:0;
  width:600px;
  height:600px;
  background:#c1d5ed;
  border-radius:100%;
  filter:blur(180px);
  opacity:0.13;
  pointer-events:none !important;
  z-index:0;
}

.bg-hero{background:linear-gradient(180deg,var(--paper) 0%,var(--surface) 100%);}

/* Under construction pulse badge */
.construction-badge{
  display:inline-flex;align-items:center;gap:10px;
  border:1px solid rgba(58,123,191,.22);background:rgba(193,213,237,.14);
  backdrop-filter:blur(10px);border-radius:999px;
  padding:.5rem 1.2rem;font-size:.82rem;font-weight:600;color:var(--dark-1);
}
.construction-dot{
  width:8px;height:8px;border-radius:50%;background:#3a7bbf;flex-shrink:0;
  animation:dotPulse 2s ease-in-out infinite;
}
@keyframes dotPulse{
  0%,100%{opacity:.5;transform:scale(.8);}
  50%{opacity:1;transform:scale(1.2);box-shadow:0 0 0 4px rgba(58,123,191,.2);}
}

/* Decorative grid dots */
.grid-dots{
  background-image:radial-gradient(rgba(193,213,237,.065) 1px,transparent 1px);
  background-size:30px 30px;
}

@media (max-width:1023px){
  #hero{min-height:auto!important;align-items:flex-start!important;padding-top:7.2rem!important;padding-bottom:4rem!important;}
}
@media (max-width:640px){
  body{overflow-x:hidden;}
  #hero{padding-inline:1.1rem!important;padding-top:6.5rem!important;padding-bottom:3.5rem!important;}
  .hero-title{font-size:clamp(2.6rem,12vw,4rem)!important;line-height:.98!important;letter-spacing:-.06em!important;}
  #hero .fade-up.mt-10{display:grid!important;grid-template-columns:1fr;gap:.85rem!important;max-width:100%;}
  #hero .btn-glow,#hero .btn-outline{width:100%;justify-content:center;}
}
@media (prefers-reduced-motion:reduce){
  .blob-bg,.orb-bg,.light-beam{animation:none!important;}
}
</style>
</head>
<body>

<!-- BLOB BG -->
<div aria-hidden="true" style="position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;">
  <svg viewBox="0 0 1154 678" xmlns="http://www.w3.org/2000/svg" style="position:absolute;top:50%;left:60%;transform:translate(-50%,-50%);filter:blur(148px);width:1100px;z-index:-1;animation:blob-turn 16s linear infinite;transform-origin:center;opacity:.32;">
    <defs>
      <linearGradient id="blobGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%"  stop-color="#c1d5ed" stop-opacity="0.7"/>
        <stop offset="50%" stop-color="#c1d5ed" stop-opacity="0.5"/>
        <stop offset="100%" stop-color="#c1d5ed" stop-opacity="0.4"/>
      </linearGradient>
    </defs>
    <ellipse cx="577" cy="339" rx="520" ry="280" fill="url(#blobGrad)"/>
  </svg>
</div>

<div class="light-beam" aria-hidden="true"></div>
<div class="orb-bg" aria-hidden="true"></div>

<!-- ═══ HEADER ═══ -->
<header id="main-header" class="fixed inset-x-0 top-0 z-50 border-b" style="border-color:transparent;">
  <nav aria-label="Global" class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4 lg:px-8">
    <!-- Logo placeholder -->
    <div class="flex lg:flex-1">
      <span class="text-sm font-bold tracking-tight" style="color:var(--dark-1);">●</span>
    </div>

    <!-- Desktop nav -->
    <div class="hidden lg:flex lg:gap-x-8 items-center">
      <a href="#" class="nav-link">Serviços</a>
      <a href="#" class="nav-link">Produtos</a>
      <a href="#" class="nav-link">Comunidade</a>
      <a href="#" class="nav-link">Educação</a>
    </div>

    <!-- Mobile menu button -->
    <div class="flex lg:hidden">
      <button type="button" id="menu-open-btn" class="-m-2.5 inline-flex items-center justify-center rounded-md p-2.5 text-gray-700">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="size-6"><path d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </nav>

  <!-- Mobile menu -->
  <div id="mobile-menu" class="hidden">
    <div class="fixed inset-y-0 right-0 z-50 w-full overflow-y-auto bg-white p-6 sm:max-w-sm" style="box-shadow:-4px 0 40px rgba(193,213,237,.12);">
      <div class="flex items-center justify-between mb-6">
        <span class="text-sm font-bold" style="color:var(--dark-1);">●</span>
        <button type="button" id="menu-close-btn" class="-m-2.5 p-2.5 rounded-md text-gray-700">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="size-6"><path d="M6 18 18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
      <div class="space-y-1">
        <a href="#" class="nav-link-mobile">Serviços</a>
        <a href="#" class="nav-link-mobile">Produtos</a>
        <a href="#" class="nav-link-mobile">Comunidade</a>
        <a href="#" class="nav-link-mobile">Educação</a>
      </div>
    </div>
  </div>
</header>

<!-- ═══ HERO ═══ -->
<section id="hero" class="bg-hero relative isolate min-h-screen flex items-center px-6 pt-28 pb-16 lg:px-8 overflow-hidden has-blob">
  <div class="blob-bg" aria-hidden="true"></div>

  <!-- Decorative blob top -->
  <div aria-hidden="true" class="absolute inset-x-0 -top-40 -z-10 overflow-hidden blur-3xl sm:-top-80 pointer-events-none">
    <div class="relative left-[calc(50%-11rem)] w-[36rem] -translate-x-1/2 rotate-[30deg] bg-gradient-to-tr from-[#c1d5ed] to-[#c1d5ed] opacity-25 sm:left-[calc(50%-30rem)] sm:w-[72rem]" style="aspect-ratio:1155/678;clip-path:polygon(74.1% 44.1%,100% 61.6%,97.5% 26.9%,85.5% 0.1%,80.7% 2%,72.5% 32.5%,60.2% 62.4%,52.4% 68.1%,47.5% 58.3%,45.2% 34.5%,27.5% 76.7%,0.1% 64.9%,17.9% 100%,27.6% 76.8%,76.1% 97.7%,74.1% 44.1%)"></div>
  </div>

  <!-- Grid dots bg -->
  <div class="absolute inset-0 -z-10 grid-dots"></div>

  <div class="mx-auto max-w-3xl text-center">

    <!-- Badge -->
    <div class="mb-8 flex justify-center">
      <div class="construction-badge">
        <span class="construction-dot"></span>
        Página em desenvolvimento — volte em breve
      </div>
    </div>

    <!-- Title -->
    <h1 class="hero-title text-5xl font-extrabold sm:text-7xl leading-[1.02]" style="letter-spacing:-.04em;">
      <span class="gradient-text-hero">Em construção</span>
    </h1>

    <!-- CTA buttons -->
    <div class="mt-10 flex items-center justify-center">
      <a href="#" class="btn-glow px-7 py-3.5 text-sm font-semibold text-white rounded-xl flex items-center gap-2">
        Em construção
        <svg class="size-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13 7l5 5-5 5M6 12h12" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </a>
    </div>

  </div>

  <!-- Decorative blob bottom -->
  <div aria-hidden="true" class="absolute inset-x-0 top-[calc(100%-13rem)] -z-10 overflow-hidden blur-3xl sm:top-[calc(100%-30rem)] pointer-events-none">
    <div class="relative left-[calc(50%+3rem)] w-[36rem] -translate-x-1/2 bg-gradient-to-tr from-[#c1d5ed] to-[#c1d5ed] opacity-20 sm:left-[calc(50%+36rem)] sm:w-[72rem]" style="aspect-ratio:1155/678;clip-path:polygon(74.1% 44.1%,100% 61.6%,97.5% 26.9%,85.5% 0.1%,80.7% 2%,72.5% 32.5%,60.2% 62.4%,52.4% 68.1%,47.5% 58.3%,45.2% 34.5%,27.5% 76.7%,0.1% 64.9%,17.9% 100%,27.6% 76.8%,76.1% 97.7%,74.1% 44.1%)"></div>
  </div>
</section>

<script>
  // Header scroll effect
  const header = document.getElementById('main-header');
  if (header) {
    header.classList.add('nav-top');
    function updateHeader() {
      const y = window.scrollY || window.pageYOffset;
      header.classList.remove('nav-top','nav-scrolled');
      if (y < 60) header.classList.add('nav-top');
      else header.classList.add('nav-scrolled');
    }
    window.addEventListener('scroll', updateHeader, { passive: true });
    updateHeader();
  }

  // Mobile menu
  const menuOpenBtn  = document.getElementById('menu-open-btn');
  const menuCloseBtn = document.getElementById('menu-close-btn');
  const mobileMenu   = document.getElementById('mobile-menu');
  if (menuOpenBtn && mobileMenu)  menuOpenBtn.addEventListener('click',  () => mobileMenu.classList.remove('hidden'));
  if (menuCloseBtn && mobileMenu) menuCloseBtn.addEventListener('click', () => mobileMenu.classList.add('hidden'));

  // Button shine
  document.querySelectorAll('.btn-glow').forEach(btn => {
    let last = -20;
    btn.addEventListener('mousemove', (e) => {
      const rect = btn.getBoundingClientRect();
      let pct = ((e.clientX - rect.left) / rect.width) * 100 - 11;
      pct = Math.max(0, Math.min(78, pct));
      btn.style.setProperty('--btn-left', pct + '%');
    });
    btn.addEventListener('mouseleave', () => {
      btn.style.setProperty('--btn-left', '-20%');
    });
  });
</script>
</body>
</html>
