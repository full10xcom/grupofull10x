<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Em construção</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root{
  --accent:#c1d5ed;
  --accent-dark:#3a7bbf;
  --surface:#f0f7fd;
  --dark-1:#0d1b2a;
  --dark-2:#1a3a5c;
  --button-gradient:linear-gradient(45deg,#c1d5ed,#3a7bbf,#c1d5ed,#3a7bbf);
  --title-gradient:linear-gradient(90deg,#0d1b2a 0%,#3a7bbf 35%,#c1d5ed 55%,#3a7bbf 75%,#0d1b2a 100%);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;background:#fff;color:#111;overflow-x:hidden;min-height:100vh;}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--surface);}
::-webkit-scrollbar-thumb{background:rgba(193,213,237,.48);border-radius:99px;}

/* GRAIN */
body::before{
  content:'';position:fixed;inset:0;z-index:999;pointer-events:none;opacity:.022;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* LIGHT BEAM */
.light-beam{
  pointer-events:none;position:fixed;top:-10vh;left:50%;transform:translateX(-50%);
  width:min(560px,90vw);height:88vh;
  background:conic-gradient(from 180deg at 50% 0%,rgba(193,213,237,.18) 0deg,transparent 55deg,transparent 305deg,rgba(58,123,191,.14) 360deg);
  filter:blur(34px);z-index:0;animation:beamPulse 9s ease-in-out infinite alternate;
}
@keyframes beamPulse{
  from{opacity:.55;transform:translateX(-50%) scaleX(1);}
  to{opacity:1;transform:translateX(-50%) scaleX(1.2);}
}

/* ORB BG */
.orb-bg{
  position:fixed;top:50%;left:60%;transform:translate(-50%,-50%);
  width:min(1154px,150vw);height:min(1154px,150vw);
  filter:blur(140px);z-index:0;pointer-events:none;
  animation:blobTurn 18s linear infinite;transform-origin:center;
  border-radius:40% 60% 55% 45%/50% 45% 55% 50%;
  background:conic-gradient(from 0deg,rgba(193,213,237,.18) 0%,rgba(212,231,245,.12) 25%,rgba(193,213,237,.06) 50%,rgba(58,123,191,.14) 75%,rgba(193,213,237,.18) 100%);
  opacity:.16;
}
@keyframes blobTurn{
  0%{transform:translate(-50%,-50%) rotate(0deg);}
  100%{transform:translate(-50%,-50%) rotate(360deg);}
}

/* HEADER */
#main-header{
  position:fixed;inset-x:0;top:0;z-index:50;
  border-bottom:1px solid transparent;
  transition:background .45s,border-color .45s,box-shadow .45s;
}
#main-header.nav-top{background:transparent;border-color:transparent;box-shadow:none;}
#main-header.nav-scrolled{
  background:rgba(255,255,255,.88);
  backdrop-filter:blur(28px) saturate(210%) brightness(1.05);
  -webkit-backdrop-filter:blur(28px) saturate(210%) brightness(1.05);
  border-color:rgba(193,213,237,.14);
  box-shadow:0 4px 28px rgba(193,213,237,.1),0 1px 3px rgba(0,0,0,.05),inset 0 1px 0 rgba(255,255,255,.9);
}

.nav-wrap{
  max-width:1280px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
  padding:.9rem 1.5rem;
  position:relative;z-index:1;
}

/* Logo icon */
.logo-icon{
  width:32px;height:32px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(135deg,#3a7bbf,#c1d5ed);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(58,123,191,.28);
  text-decoration:none;
}

/* Desktop nav links */
.nav-desktop{
  display:flex;gap:2rem;align-items:center;
}
.nav-link{
  position:relative;display:inline-block;text-decoration:none;
  font-weight:600;font-size:.875rem;white-space:nowrap;
  background-image:linear-gradient(90deg,#0d1b2a,#3a7bbf,#c1d5ed);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:#374151;background-size:200%;
  transition:background-position .4s ease;
}
.nav-link::after{
  content:'';position:absolute;left:0;bottom:-3px;
  width:0;height:2px;border-radius:999px;
  background:linear-gradient(90deg,#0d1b2a,#3a7bbf,#c1d5ed);
  transition:width .35s cubic-bezier(.4,0,.2,1);
}
.nav-link:hover{-webkit-text-fill-color:transparent;background-position:100%;}
.nav-link:hover::after{width:100%;}

/* Hamburger */
.hamburger{
  display:none;align-items:center;justify-content:center;
  width:40px;height:40px;border-radius:10px;
  border:1px solid rgba(193,213,237,.32);
  background:rgba(255,255,255,.72);
  cursor:pointer;backdrop-filter:blur(8px);
  transition:background .2s,border-color .2s;
}
.hamburger:hover{background:rgba(240,247,253,.9);border-color:rgba(58,123,191,.3);}

/* DRAWER */
.drawer-overlay{
  display:none;position:fixed;inset:0;z-index:40;
  background:rgba(13,27,42,.28);backdrop-filter:blur(4px);
  opacity:0;transition:opacity .3s;
}
.drawer-overlay.open{display:block;opacity:1;}

.drawer{
  position:fixed;inset-y:0;right:0;z-index:50;
  width:min(300px,86vw);
  background:#fff;
  box-shadow:-6px 0 48px rgba(58,123,191,.14);
  transform:translateX(100%);
  transition:transform .35s cubic-bezier(.4,0,.2,1);
  overflow-y:auto;
}
.drawer.open{transform:translateX(0);}

.drawer-inner{padding:1.5rem;}
.drawer-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:2rem;
}
.drawer-close{
  width:36px;height:36px;border-radius:10px;
  border:1px solid rgba(193,213,237,.28);
  background:#f0f7fd;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s;
}
.drawer-close:hover{background:#e4f0fa;}

.drawer-nav{display:flex;flex-direction:column;gap:.2rem;}
.nav-link-mobile{
  position:relative;display:block;border-radius:12px;
  padding:.8rem 1rem;text-decoration:none;
  font-weight:700;font-size:1.05rem;
  background-image:linear-gradient(90deg,#0d1b2a,#3a7bbf,#c1d5ed);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:#0d1b2a;background-size:200%;
  transition:background-position .4s ease,background-color .2s;
}
.nav-link-mobile::after{
  content:'';position:absolute;left:1rem;bottom:8px;
  width:0;height:2px;border-radius:999px;
  background:linear-gradient(90deg,#0d1b2a,#3a7bbf,#c1d5ed);
  transition:width .35s cubic-bezier(.4,0,.2,1);
}
.nav-link-mobile:hover{
  -webkit-text-fill-color:transparent;background-position:100%;
  background-color:rgba(193,213,237,.08);
}
.nav-link-mobile:hover::after{width:calc(100% - 2rem);}

.drawer-divider{
  margin:1.5rem 0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(193,213,237,.4),transparent);
}

/* GRADIENT TITLE */
.gradient-text-hero{
  background-image:var(--title-gradient);
  background-size:240% 100%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:titleFlow 7.5s linear infinite;
  display:inline-block;line-height:1.05;
}
@keyframes titleFlow{
  from{background-position:0% 50%;}
  to{background-position:200% 50%;}
}

/* BTN GLOW */
.btn-glow{
  position:relative;display:inline-flex;align-items:center;justify-content:center;
  overflow:hidden;border-radius:999px;color:#fff;
  border:1px solid rgba(58,123,191,.34);
  background-color:var(--accent);
  background-image:var(--button-gradient);
  background-size:400% 200%;
  animation:btnTex 3.4s cubic-bezier(.2,.5,.9,.6) 2s infinite;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow .25s;
  box-shadow:0 14px 34px rgba(58,123,191,.22),0 0 0 1px rgba(255,255,255,.22) inset;
  white-space:nowrap;cursor:pointer;text-decoration:none;
}
.btn-glow::before{
  content:'';position:absolute;inset:1px;border-radius:inherit;
  background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,0));
  pointer-events:none;
}
.btn-glow::after{
  content:'';position:absolute;top:50%;transform:translateY(-50%);
  left:var(--btn-left,-20%);z-index:1;
  width:22%;height:76%;
  background:linear-gradient(90deg,rgba(255,255,255,.12),rgba(212,231,245,.92),rgba(255,255,255,.08));
  filter:blur(14px);opacity:.58;mix-blend-mode:screen;pointer-events:none;
}
.btn-glow:hover{
  transform:translateY(-2px) scale(1.02);
  box-shadow:0 18px 40px rgba(58,123,191,.28),0 0 0 1px rgba(255,255,255,.22) inset;
}
.btn-glow > *{position:relative;z-index:2;}
@keyframes btnTex{0%{background-position:0 0;}100%{background-position:100% 0;}}

/* HERO */
#hero{
  position:relative;isolation:isolate;
  min-height:100svh;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(180deg,#fff 0%,var(--surface) 100%);
  padding:7rem 1.5rem 4rem;
  overflow:hidden;text-align:center;
}
#hero::before{
  content:'';position:absolute;top:50%;left:50%;
  width:min(800px,140vw);height:min(800px,140vw);
  transform:translate(-50%,-50%);
  background:#3a7bbf;border-radius:100%;filter:blur(180px);
  pointer-events:none;z-index:0;opacity:.16;
}
#hero::after{
  content:'';position:absolute;top:0;right:0;
  width:min(600px,100vw);height:min(600px,100vw);
  background:#c1d5ed;border-radius:100%;filter:blur(180px);
  pointer-events:none;z-index:0;opacity:.12;
}
.hero-blob{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:min(900px,130vw);height:min(900px,130vw);
  border-radius:50%;filter:blur(112px);z-index:0;pointer-events:none;
  animation:blobTurn 18s linear infinite;opacity:.26;
  background:conic-gradient(rgba(193,213,237,.16),rgba(212,231,245,.24),rgba(193,213,237,.18),rgba(232,243,251,.14));
}
.grid-dots{
  position:absolute;inset:0;z-index:0;pointer-events:none;
  background-image:radial-gradient(rgba(193,213,237,.07) 1px,transparent 1px);
  background-size:28px 28px;
}
.hero-content{position:relative;z-index:1;width:100%;max-width:720px;margin:0 auto;}

/* Badge */
.construction-badge{
  display:inline-flex;align-items:center;gap:8px;flex-wrap:wrap;
  border:1px solid rgba(58,123,191,.22);background:rgba(193,213,237,.14);
  backdrop-filter:blur(10px);border-radius:999px;
  padding:.45rem 1rem;
  font-size:clamp(.7rem,2.2vw,.82rem);font-weight:600;color:var(--dark-1);
  max-width:calc(100vw - 3rem);justify-content:center;
}
.construction-dot{
  width:8px;height:8px;flex-shrink:0;border-radius:50%;background:#3a7bbf;
  animation:dotPulse 2s ease-in-out infinite;
}
@keyframes dotPulse{
  0%,100%{opacity:.5;transform:scale(.8);}
  50%{opacity:1;transform:scale(1.2);box-shadow:0 0 0 4px rgba(58,123,191,.2);}
}

/* Title */
.hero-title{
  font-size:clamp(2.4rem,8vw,5rem);font-weight:900;
  letter-spacing:-.04em;line-height:1.05;margin-top:1.5rem;
}

/* RESPONSIVE BREAKPOINTS */
@media (max-width:1023px){
  .nav-desktop{display:none!important;}
  .hamburger{display:flex!important;}
}
@media (min-width:1024px){
  .hamburger{display:none!important;}
  .nav-desktop{display:flex!important;}
}

@media (max-width:640px){
  #hero{
    padding-top:5.5rem;padding-bottom:3rem;
    padding-inline:1.25rem;min-height:100svh;
  }
  .hero-title{
    font-size:clamp(2.2rem,10.5vw,3rem);
    letter-spacing:-.05em;
  }
  .btn-glow-hero{
    width:100%;max-width:300px;
    font-size:.9rem;padding:.9rem 1.4rem;
  }
  .construction-badge{
    font-size:.7rem;padding:.4rem .85rem;
    text-align:center;
  }
  .orb-bg{
    width:90vw;height:90vw;filter:blur(90px);opacity:.1;left:50%;
  }
  .light-beam{width:75vw;filter:blur(24px);opacity:.65;}
}

@media (max-width:380px){
  .hero-title{font-size:2rem;}
}

@media (prefers-reduced-motion:reduce){
  .orb-bg,.light-beam,.hero-blob,.gradient-text-hero,.btn-glow{
    animation:none!important;transition:none!important;
  }
}
</style>
</head>
<body>

<!-- Fixed bg effects -->
<div class="light-beam" aria-hidden="true"></div>
<div class="orb-bg"     aria-hidden="true"></div>
<div aria-hidden="true" style="position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;">
  <svg viewBox="0 0 1154 678" xmlns="http://www.w3.org/2000/svg"
    style="position:absolute;top:50%;left:60%;transform:translate(-50%,-50%);
    filter:blur(148px);width:min(1100px,130vw);
    animation:blobTurn 16s linear infinite;transform-origin:center;opacity:.26;">
    <defs>
      <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%"   stop-color="#c1d5ed" stop-opacity=".7"/>
        <stop offset="50%"  stop-color="#c1d5ed" stop-opacity=".5"/>
        <stop offset="100%" stop-color="#c1d5ed" stop-opacity=".4"/>
      </linearGradient>
    </defs>
    <ellipse cx="577" cy="339" rx="520" ry="280" fill="url(#bg)"/>
  </svg>
</div>

<!-- ═══ HEADER ═══ -->
<header id="main-header" class="nav-top">
  <div class="nav-wrap">

    <!-- Logo -->
    <a href="#" class="logo-icon" aria-label="Home">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><circle cx="12" cy="12" r="5"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
    </a>

    <!-- Desktop nav -->
    <div class="nav-desktop" id="desktop-nav">
      <a href="#" class="nav-link">Serviços</a>
      <a href="#" class="nav-link">Produtos</a>
      <a href="#" class="nav-link">Comunidade</a>
      <a href="#" class="nav-link">Educação</a>
    </div>

    <!-- Hamburger -->
    <button class="hamburger" id="menu-open-btn" aria-label="Abrir menu">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0d1b2a" stroke-width="2">
        <path d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" stroke-linecap="round"/>
      </svg>
    </button>

  </div>
</header>

<!-- ═══ DRAWER ═══ -->
<div class="drawer-overlay" id="drawer-overlay"></div>
<div class="drawer" id="drawer">
  <div class="drawer-inner">

    <div class="drawer-header">
      <a href="#" class="logo-icon" aria-label="Home">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><circle cx="12" cy="12" r="5"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
      </a>
      <button class="drawer-close" id="menu-close-btn" aria-label="Fechar menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0d1b2a" stroke-width="2">
          <path d="M6 18 18 6M6 6l12 12" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <nav class="drawer-nav">
      <a href="#" class="nav-link-mobile">Serviços</a>
      <a href="#" class="nav-link-mobile">Produtos</a>
      <a href="#" class="nav-link-mobile">Comunidade</a>
      <a href="#" class="nav-link-mobile">Educação</a>
    </nav>

    <div class="drawer-divider"></div>

    <a href="#" class="btn-glow" style="display:flex;width:100%;padding:.85rem 1.2rem;font-size:.9rem;font-weight:700;border-radius:14px;gap:8px;justify-content:center;">
      Em construção
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 7l5 5-5 5M6 12h12" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>

  </div>
</div>

<!-- ═══ HERO ═══ -->
<section id="hero">
  <div class="hero-blob" aria-hidden="true"></div>
  <div class="grid-dots"  aria-hidden="true"></div>

  <!-- Deco top -->
  <div aria-hidden="true" style="position:absolute;inset-x:0;top:-10rem;z-index:-1;overflow:hidden;filter:blur(3rem);pointer-events:none;">
    <div style="position:relative;width:min(36rem,100%);margin:0 auto;
      left:calc(50% - 11rem);transform:translateX(-50%) rotate(30deg);
      background:linear-gradient(135deg,#c1d5ed,#c1d5ed);opacity:.2;
      aspect-ratio:1155/678;
      clip-path:polygon(74.1% 44.1%,100% 61.6%,97.5% 26.9%,85.5% 0.1%,80.7% 2%,72.5% 32.5%,60.2% 62.4%,52.4% 68.1%,47.5% 58.3%,45.2% 34.5%,27.5% 76.7%,0.1% 64.9%,17.9% 100%,27.6% 76.8%,76.1% 97.7%,74.1% 44.1%);">
    </div>
  </div>

  <div class="hero-content">

    <!-- Badge -->
    <div style="display:flex;justify-content:center;margin-bottom:1.75rem;">
      <div class="construction-badge">
        <span class="construction-dot"></span>
        Página em desenvolvimento — volte em breve
      </div>
    </div>

    <!-- Title -->
    <h1 class="hero-title">
      <span class="gradient-text-hero">Em construção</span>
    </h1>

    <!-- CTA -->
    <div style="margin-top:2.5rem;display:flex;justify-content:center;">
      <a href="#" class="btn-glow btn-glow-hero" style="padding:.95rem 2.25rem;font-size:.95rem;font-weight:700;gap:8px;">
        Em construção
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M13 7l5 5-5 5M6 12h12" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
    </div>

  </div>

  <!-- Deco bottom -->
  <div aria-hidden="true" style="position:absolute;inset-x:0;bottom:-10rem;z-index:-1;overflow:hidden;filter:blur(3rem);pointer-events:none;">
    <div style="position:relative;width:min(36rem,100%);
      left:calc(50% + 3rem);transform:translateX(-50%);
      background:linear-gradient(135deg,#c1d5ed,#c1d5ed);opacity:.16;
      aspect-ratio:1155/678;
      clip-path:polygon(74.1% 44.1%,100% 61.6%,97.5% 26.9%,85.5% 0.1%,80.7% 2%,72.5% 32.5%,60.2% 62.4%,52.4% 68.1%,47.5% 58.3%,45.2% 34.5%,27.5% 76.7%,0.1% 64.9%,17.9% 100%,27.6% 76.8%,76.1% 97.7%,74.1% 44.1%);">
    </div>
  </div>
</section>

<script>
/* Header scroll */
const header = document.getElementById('main-header');
function updateHeader(){
  const y = window.scrollY || window.pageYOffset;
  if(y >= 60){ header.classList.add('nav-scrolled'); header.classList.remove('nav-top'); }
  else       { header.classList.add('nav-top');      header.classList.remove('nav-scrolled'); }
}
window.addEventListener('scroll', updateHeader, {passive:true});
updateHeader();

/* Drawer */
const overlay  = document.getElementById('drawer-overlay');
const drawer   = document.getElementById('drawer');
const openBtn  = document.getElementById('menu-open-btn');
const closeBtn = document.getElementById('menu-close-btn');

function openDrawer(){
  overlay.classList.add('open');
  drawer.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeDrawer(){
  overlay.classList.remove('open');
  drawer.classList.remove('open');
  document.body.style.overflow = '';
}
openBtn.addEventListener('click', openDrawer);
closeBtn.addEventListener('click', closeDrawer);
overlay.addEventListener('click', closeDrawer);
drawer.querySelectorAll('a').forEach(a => a.addEventListener('click', closeDrawer));

/* Button shine (desktop only) */
document.querySelectorAll('.btn-glow').forEach(btn => {
  btn.addEventListener('mousemove', e => {
    const r = btn.getBoundingClientRect();
    const p = Math.max(0, Math.min(78, ((e.clientX - r.left) / r.width) * 100 - 11));
    btn.style.setProperty('--btn-left', p + '%');
  });
  btn.addEventListener('mouseleave', () => btn.style.setProperty('--btn-left', '-20%'));
});
</script>
</body>
</html>
